# ============================================================================
# OpenShift E2E Test Workflow
# ============================================================================
#
# This workflow tests the Spark operator from a custom Helm repository:
#   https://shruthis4.github.io/spark-operator
#
# Tests performed:
#   1. Installs Spark operator from remote Helm repo (not local chart)
#   2. Verifies fsGroup is NOT 185 (OpenShift security requirement)
#   3. Runs the docling-spark-app workload from examples/openshift/k8s/
#
# Triggers:
#   - Manual (workflow_dispatch)
#   - Push to release* branches when OpenShift-related files change
#   - Pull requests when OpenShift-related files change
#
# ============================================================================

name: OpenShift E2E Test

on:
  # Manual trigger - allows running from GitHub Actions UI or CLI
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version to test"
        required: false
        default: "v1.30.8"

  # Automatic trigger on push to release branches
  push:
    branches:
      - release*
      - doclingSparkTest #temporary branch for testing
    paths:
      - 'examples/openshift/**'
      - 'test/e2e-openshift/**'
      - '.github/workflows/openshift-e2e.yaml'

  # Automatic trigger on pull requests
  pull_request:
    branches:
      - master
      - release*
    paths:
      - 'examples/openshift/**'
      - 'test/e2e-openshift/**'
      - '.github/workflows/openshift-e2e.yaml'

permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openshift-e2e:
    name: OpenShift E2E Tests
    runs-on: ubuntu-latest
    env:
      K8S_VERSION: ${{ inputs.k8s_version || 'v1.30.8' }}
    steps:
      # ======================================================================
      # Step 1: Checkout the repository
      # ======================================================================
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ======================================================================
      # Step 2: Set up Go
      # ======================================================================
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # ======================================================================
      # Step 3: Free up disk space
      # The docling-spark image is very large (~800MB+), need space
      # ======================================================================
      - name: Free up disk space
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          
          echo ""
          echo "Removing unused Docker resources..."
          docker system prune -af --volumes
          
          echo ""
          echo "=== Disk space AFTER cleanup ==="
          df -h

      # ======================================================================
      # Step 4: Create a Kind cluster
      # This creates a local Kubernetes cluster using Docker containers
      # ======================================================================
      - name: Create Kind cluster
        env:
          K8S_VERSION: ${{ inputs.k8s_version || 'v1.30.8' }}
        run: |
          echo "Creating Kind cluster with Kubernetes ${K8S_VERSION}..."
          make kind-create-cluster KIND_K8S_VERSION=${K8S_VERSION}

      # ======================================================================
      # Step 5: Verify cluster is ready
      # ======================================================================
      - name: Verify cluster
        run: |
          echo "Verifying Kind cluster is ready..."
          kubectl cluster-info
          kubectl get nodes
          echo "Cluster is ready!"

      # ======================================================================
      # Step 6: Add Helm repository
      # This adds the custom Spark operator Helm repository
      # ======================================================================
      - name: Add custom Helm repository
        run: |
          echo "Adding Helm repository: https://shruthis4.github.io/spark-operator"
          helm repo add shruthis4-spark-operator https://shruthis4.github.io/spark-operator
          helm repo update
          echo "Available charts:"
          helm search repo shruthis4-spark-operator

      # ======================================================================
      # Step 7: Run OpenShift E2E tests
      # ======================================================================
      - name: Run OpenShift E2E tests
        run: |
          echo "Running OpenShift E2E tests..."
          echo "These tests will:"
          echo "  1. Install Spark operator from https://shruthis4.github.io/spark-operator"
          echo "  2. Verify fsGroup is NOT 185"
          echo "  3. Run docling-spark-app workload"
          echo ""

          # Run the OpenShift-specific tests from the separate directory
          go test ./test/e2e-openshift/ \
            -v \
            -ginkgo.v \
            -timeout 30m

      # ======================================================================
      # Step 8: Collect logs on failure
      # ======================================================================
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -A

          echo ""
          echo "=== Spark Operator Logs ==="
          kubectl logs -n spark-operator-openshift -l app.kubernetes.io/name=spark-operator --tail=100 || true

          echo ""
          echo "=== Docling Namespace Pods ==="
          kubectl get pods -n docling-spark -o wide || true

          echo ""
          echo "=== Driver Pod Details ==="
          kubectl describe pod -n docling-spark -l spark-role=driver || true

          echo ""
          echo "=== Driver Pod Logs ==="
          kubectl logs -n docling-spark -l spark-role=driver --tail=100 || true

          echo ""
          echo "=== SparkApplication Status ==="
          kubectl get sparkapplication -A -o yaml || true

          echo ""
          echo "=== Events in docling-spark namespace ==="
          kubectl get events -n docling-spark --sort-by='.lastTimestamp' || true

          echo ""
          echo "=== All Recent Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50

      # ======================================================================
      # Step 9: Cleanup
      # ======================================================================
      - name: Cleanup Kind cluster
        if: always()
        run: |
          echo "Cleaning up Kind cluster..."
          make kind-delete-cluster || true

