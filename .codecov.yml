# Codecov configuration for Spark Operator
# Documentation: https://docs.codecov.io/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: 70...100

  status:
    project:
      default:
        target: 70%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: false

  ignore:
    - "test/**"
    - "**/*_test.go"
    - "hack/**"
    - "vendor/**"
    - "examples/**"
    - "docs/**"

comment:
  layout: "header, diff, changes, tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

github_checks:
  annotations: true
