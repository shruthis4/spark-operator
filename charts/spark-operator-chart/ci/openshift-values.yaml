# ============================================================================
# OpenShift-specific Helm values for Spark Operator
# ============================================================================
#
# These values are used when testing the Spark operator from:
#   https://shruthis4.github.io/spark-operator
#
# Key differences from default values:
# - fsGroup should NOT be 185 (OpenShift security requirement)
# - Security contexts configured for OpenShift compatibility
# ============================================================================

# Note: The actual image tag and repository are controlled by the chart
# from the remote repository. This file can be used to override values
# if needed during testing.

# Example overrides (uncomment if needed):
# controller:
#   securityContext:
#     fsGroup: 1000650000  # OpenShift-compatible fsGroup

